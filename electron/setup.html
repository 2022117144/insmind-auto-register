<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>insMind Desktop - 初始设置</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  margin: 0;
  padding: 30px 40px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.container { max-width: 480px; width: 100%; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #fff; }
p.sub { color: #8888aa; font-size: 13px; margin-top: 4px; margin-bottom: 24px; }
.section { margin-bottom: 20px; }
label { display: block; font-size: 12px; font-weight: 600; color: #aaaacc; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
input[type="text"], input[type="number"] {
  width: 100%;
  padding: 10px 12px;
  background: #16213e;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  outline: none;
  box-sizing: border-box;
  transition: border-color 0.2s;
}
input:focus { border-color: #4a6cf7; }
.row { display: flex; gap: 12px; }
.row > * { flex: 1; }
.hint { font-size: 11px; color: #6666aa; margin-top: 4px; }
.btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #4a6cf7, #6c47ff);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.9; }
.btn:active { opacity: 0.8; }
.status { margin-top: 16px; text-align: center; font-size: 13px; color: #6a6a9a; }
.datapath {
  background: #0f0f23;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: #8888aa;
  word-break: break-all;
}
</style>
</head>
<body>
<div class="container">
  <h1>🚀 insMind Desktop</h1>
  <p class="sub">首次使用，请配置代理和存储路径</p>

  <div class="section">
    <label>数据存储目录</label>
    <div class="datapath" id="dataPath">加载中...</div>
  </div>

  <div class="section">
    <label>HTTP 代理</label>
    <div class="row">
      <div>
        <input type="text" id="proxyHost" placeholder="127.0.0.1" value="127.0.0.1">
        <div class="hint">代理地址</div>
      </div>
      <div style="max-width:120px">
        <input type="number" id="proxyPort" placeholder="7897" value="7897" min="1" max="65535">
        <div class="hint">端口</div>
      </div>
    </div>
    <div class="hint">如果直连不需要代理，留空即可</div>
  </div>

  <div class="section">
    <label>Clash 控制器（可选）</label>
    <div class="row">
      <div>
        <input type="text" id="clashUrl" placeholder="http://127.0.0.1:9097" value="http://127.0.0.1:9097">
        <div class="hint">External Controller 地址</div>
      </div>
    </div>
    <div class="hint">用于自动切换节点，不需要留空</div>
  </div>

  <button class="btn" onclick="save()">保存并启动</button>
  <div class="status" id="status"></div>
</div>

<script>
  const { ipcRenderer } = require('electron')

  // 显示已选的数据目录
  ipcRenderer.invoke('get-data-path').then(p => {
    document.getElementById('dataPath').textContent = p
  })

  async function save() {
    const host = document.getElementById('proxyHost').value.trim()
    const port = document.getElementById('proxyPort').value.trim()
    const clashUrl = document.getElementById('clashUrl').value.trim()

    await ipcRenderer.invoke('save-proxy-settings', {
      proxyType: host ? 'http' : '',
      proxyHost: host,
      proxyPort: port,
      clashUrl: clashUrl,
    })
    document.getElementById('status').textContent = '✓ 配置已保存，启动中...'
    // 关闭设置窗口，启动主窗口
    await ipcRenderer.invoke('setup-done')
  }
</script>
</body>
</html>
